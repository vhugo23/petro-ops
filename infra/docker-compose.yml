services:
  dev:
    build:
      context: ..
      dockerfile: infra/Dockerfile.dev
    container_name: petroops-ai-dev
    working_dir: /workspace
    volumes:
      - ..:/workspace
    env_file:
      - ../.env.example
    ports:
      - "3000:3000"
    command: /bin/bash
    tty: true
    stdin_open: true